name: Documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rusty-alto
        uses: actions/checkout@v4
        with:
          path: rusty-alto

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rusty-alto

      - name: Build API documentation
        working-directory: rusty-alto
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

      - name: Add documentation landing page
        run: |
          cat > rusty-alto/target/doc/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="description" content="Documentation for rusty-alto, a fast Rust library for weighted tree automata and interpreted regular tree grammars.">
            <title>rusty-alto documentation</title>
            <style>
              :root {
                color-scheme: light dark;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f4f1eb;
                color: #25221e;
              }
              body {
                display: grid;
                min-height: 100vh;
                margin: 0;
                place-items: center;
              }
              main {
                box-sizing: border-box;
                width: min(42rem, calc(100% - 2rem));
                padding: 3rem;
                border: 1px solid #d8d0c4;
                border-radius: 1rem;
                background: #fffdf8;
                box-shadow: 0 1rem 3rem rgb(75 61 42 / 12%);
              }
              h1 {
                margin: 0 0 1rem;
                font-size: clamp(2.3rem, 8vw, 4rem);
                letter-spacing: -0.05em;
              }
              p {
                max-width: 36rem;
                margin: 0 0 2rem;
                color: #625a50;
                font-size: 1.1rem;
                line-height: 1.6;
              }
              nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
              }
              a {
                padding: 0.75rem 1rem;
                border: 1px solid #ba5b38;
                border-radius: 0.55rem;
                color: #9d3f20;
                font-weight: 650;
                text-decoration: none;
              }
              a:first-child {
                background: #ad4827;
                color: white;
              }
              a:hover, a:focus-visible {
                outline: 3px solid rgb(173 72 39 / 22%);
                outline-offset: 2px;
              }
              @media (prefers-color-scheme: dark) {
                :root {
                  background: #171512;
                  color: #f3eee5;
                }
                main {
                  border-color: #443d34;
                  background: #221f1a;
                  box-shadow: none;
                }
                p {
                  color: #bdb3a5;
                }
                a {
                  border-color: #df7956;
                  color: #f1a184;
                }
                a:first-child {
                  background: #c65631;
                  color: white;
                }
              }
            </style>
          </head>
          <body>
            <main>
              <h1>rusty-alto</h1>
              <p>
                A fast Rust library and command-line toolkit for weighted tree
                automata and interpreted regular tree grammars, compatible
                with Alto data formats.
              </p>
              <nav aria-label="Documentation links">
                <a href="rusty_alto/">API documentation</a>
                <a href="https://github.com/coli-saar/rusty-alto">GitHub repository</a>
                <a href="https://github.com/coli-saar/rusty-alto/wiki">Technical wiki</a>
              </nav>
            </main>
          </body>
          </html>
          EOF

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rusty-alto/target/doc

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish API documentation
        id: deployment
        uses: actions/deploy-pages@v4
