name: Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out documentation source
        uses: actions/checkout@v4

      - name: Check out GitHub wiki
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchronize pages
        run: |
          rsync --archive --delete --exclude .git wiki/ wiki-repository/

      - name: Publish changed pages
        working-directory: wiki-repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
          else
            git commit -m "Update wiki from ${GITHUB_SHA}"
            git push origin HEAD
          fi
